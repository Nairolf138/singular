name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . ruff black
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check --target-version py310 --fast .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install typecheck dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . mypy
      - name: Mypy
        run: mypy src

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pytest pytest-cov
      - name: Pytest
        run: pytest --cov=src/singular --cov-report=term-missing


  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, tests]
    if: ${{ always() }}
    steps:
      - name: Fail when dependencies failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "Upstream CI job failed or was cancelled."
          exit 1
      - name: CI summary
        run: echo "lint/typecheck/tests completed successfully."
